name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: workspace
          POSTGRES_PASSWORD: workspace
          POSTGRES_DB: workspace_ai
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U workspace -d workspace_ai"
          --health-interval 5s --health-timeout 5s --health-retries 10

    env:
      DATABASE_URL: postgresql://workspace:workspace@localhost:5432/workspace_ai?schema=public
      OPENAI_API_KEY: dummy-key-for-ci

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run prisma:generate
      - run: npx prisma migrate deploy
      - run: npm run format:check
      - run: npm run lint
      - run: npm test
      - run: npm run build
